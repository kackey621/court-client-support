name: Build installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: mac
            runner: macos-latest
            ndlocr_cmd: bash scripts/build-ndlocr.sh
            package_cmd: npm run build && npx electron-builder --mac
          - os: win
            runner: windows-latest
            ndlocr_cmd: pwsh -File scripts/build-ndlocr.ps1
            package_cmd: npm run build && npx electron-builder --win
          - os: linux
            runner: ubuntu-latest
            ndlocr_cmd: PLATFORM_DIR=linux bash scripts/build-ndlocr.sh
            package_cmd: npm run build && npx electron-builder --linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install native build tools (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Install npm deps
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build NDLOCR-Lite bundle
        run: ${{ matrix.ndlocr_cmd }}

      - name: Verify NDLOCR bundle exists
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            mac)   ls -la resources/ndlocr/mac/ ;;
            win)   ls -la resources/ndlocr/win/ ;;
            linux) ls -la resources/ndlocr/linux/ ;;
          esac

      - name: Build Electron renderer/main
        run: npm run build

      - name: Package installer
        env:
          # macOS 署名・公証を使う場合はシークレットを設定
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ${{ matrix.package_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CourtStrategies-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn

  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
